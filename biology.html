<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>জীববিজ্ঞান - Book Info</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #ffffff);
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .book-container {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px 25px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .book-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 35px rgba(0,0,0,0.15);
    }

    .book-container img {
      width: 100%;
      max-width: 300px;
      height: auto;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #0284c7;
      margin-bottom: 12px;
      font-size: 26px;
      line-height: 1.3;
    }

    p {
      margin: 8px 0;
      font-size: 18px;
      line-height: 1.4;
    }

    a.back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #0284c7;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      transition: 0.3s;
    }

    a.back-btn:hover {
      background: #0369a1;
    }

    @media (max-width: 480px) {
      .book-container {
        padding: 20px 15px;
      }

      h1 {
        font-size: 22px;
      }

      p {
        font-size: 16px;
      }

      a.back-btn {
        padding: 8px 20px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="book-container">
    <h1>জীববিজ্ঞান</h1>
    <img src="https://i.ibb.co.com/zh4L6QCF/IMG-20260404-173942.jpg" alt="জীববিজ্ঞান Book">
    <p><strong>Instructor:</strong> সৌম্য সরকার</p>
    <p><strong>Total Classes in week:</strong> ৪টি</p>
    <a class="back-btn" href="index.html">Back to Routine</a>
  </div>
</body>
</html>
